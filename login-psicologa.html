<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · PsiAna</title>
<style>
  body{ font-family:'Segoe UI', Arial, sans-serif; background:#FAF6F5; color:#2C2C2C; padding:2rem 1rem; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap{ max-width:380px; width:100%; }
  .card{ background:#fff; border:1px solid #EDE4E3; border-radius:12px; padding:2rem 1.75rem; text-align:center; }
  .selo-frame{
    width:78px; height:78px; margin:0 auto 16px; border-radius:50%;
    background:#fff; border:1px solid #EDE4E3; display:flex; align-items:center; justify-content:center;
    position:relative; box-shadow:0 8px 20px -8px rgba(120,93,86,0.3);
  }
  .selo-frame::before{
    content:''; position:absolute; inset:-6px; border-radius:50%;
    border:1px dashed #C89F9D; opacity:0.45;
  }
  .selo-frame img{ width:42px; height:42px; object-fit:contain; }
  h1{ font-size:19px; color:#2C2C2C; margin:0 0 6px; font-weight:600; }
  p.sub{ font-size:13px; color:#999; margin:0 0 24px; }
  .field{ text-align:left; margin-bottom:16px; position:relative; }
  label{ display:block; font-size:12px; color:#785D56; margin-bottom:6px; }
  input{ width:100%; padding:11px 12px; border:1px solid #DDD; border-radius:8px; font-size:14px; box-sizing:border-box; font-family:inherit; }
  input:focus{ outline:none; border-color:#C89F9D; }
  .toggle-eye{ position:absolute; right:10px; top:34px; cursor:pointer; color:#999; }
  .toggle-eye svg{ width:18px; height:18px; }
  button{ width:100%; padding:12px; border:none; border-radius:8px; background:#785D56; color:#fff; font-size:14px; font-weight:500; cursor:pointer; margin-top:6px; }
  button:hover{ background:#C89F9D; }
  button:disabled{ background:#DDD; cursor:not-allowed; }
  .erro{ display:none; background:#FFEBEE; color:#C62828; font-size:12.5px; padding:10px 12px; border-radius:8px; margin-bottom:14px; text-align:left; }
  .erro.show{ display:block; }
  .loading{ font-size:12.5px; color:#C89F9D; margin-top:12px; display:none; }
  .loading.show{ display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="selo-frame">
      <img src="selo.png" alt="PsiAna" onerror="this.onerror=null; this.src='icone_selo.png';">
    </div>
    <h1>Cantinho da Psi</h1>
    <p class="sub">Acesse com seu CPF e senha.</p>

    <div class="erro" id="erro">CPF ou senha incorretos.</div>

    <form onsubmit="return false;">
      <div class="field">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="username">
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
        <span class="toggle-eye" onclick="toggleEye()">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </div>
      <button id="btnEntrar" onclick="fazerLogin()">Entrar</button>
      <p class="loading" id="loading">Verificando…</p>
    </form>
  </div>
</div>

<script>
  // ===== Configuração =====
  var N8N_WEBHOOK_LOGIN = 'https://psi3ana.app.n8n.cloud/webhook/login-psicologa';
  var REDIRECT_APOS_LOGIN = 'visao-geral.html';

  var EYE_OPEN = '<path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3"/>';
  var EYE_CLOSED = '<path d="M3 3l18 18"/><path d="M10.6 5.2A10.8 10.8 0 0 1 12 5c7 0 10.5 7 10.5 7a13.6 13.6 0 0 1-3.1 3.9M6.5 6.5C3.6 8.3 1.5 12 1.5 12s3.5 7 10.5 7a10.4 10.4 0 0 0 4.3-.9"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>';

  document.getElementById('cpf').addEventListener('input', function(e){
    var v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if(v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if(v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if(v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    e.target.value = v;
  });

  function toggleEye(){
    var input = document.getElementById('senha');
    var icon = document.getElementById('eyeIcon');
    if(input.type === 'password'){ input.type = 'text'; icon.innerHTML = EYE_CLOSED; }
    else { input.type = 'password'; icon.innerHTML = EYE_OPEN; }
  }

  async function sha256(texto){
    var encoder = new TextEncoder();
    var data = encoder.encode(texto);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b){ return b.toString(16).padStart(2, '0'); }).join('');
  }

  async function fazerLogin(){
    var cpfLimpo = document.getElementById('cpf').value.replace(/\D/g, '');
    var senha = document.getElementById('senha').value;
    var erroBox = document.getElementById('erro');
    var btn = document.getElementById('btnEntrar');
    var loading = document.getElementById('loading');

    erroBox.classList.remove('show');

    if(cpfLimpo.length !== 11 || !senha){
      erroBox.textContent = 'Preencha CPF e senha para continuar.';
      erroBox.classList.add('show');
      return;
    }

    btn.disabled = true;
    loading.classList.add('show');

    try{
      var senhaHash = await sha256(senha);
      var resposta = await fetch(N8N_WEBHOOK_LOGIN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cpf: cpfLimpo, senha_hash: senhaHash })
      });
      var dados = await resposta.json();

      if(dados && dados.sucesso){
        sessionStorage.setItem('psiana_admin_logado', 'true');
        window.location.href = REDIRECT_APOS_LOGIN;
      } else {
        erroBox.textContent = 'CPF ou senha incorretos.';
        erroBox.classList.add('show');
      }
    } catch(e){
      erroBox.textContent = 'Não foi possível conectar ao servidor. Tente novamente.';
      erroBox.classList.add('show');
    } finally {
      btn.disabled = false;
      loading.classList.remove('show');
    }
  }
</script>
</body>
</html>
