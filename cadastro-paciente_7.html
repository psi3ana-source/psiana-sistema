<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsiAna — Editar Paciente</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #FAF6F5; color: #2C2C2C; }
  .header { background: #fff; border-bottom: 1px solid #EDE4E3; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 700; color: #785D56; }
  .btn-voltar { padding: 7px 14px; border: 1px solid #DDD; border-radius: 8px; background: #fff; color: #785D56; font-size: 13px; cursor: pointer; }
  .btn-voltar:hover { background: #F0E8E7; }
  .container { max-width: 760px; margin: 0 auto; padding: 24px 16px; }
  .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #EDE4E3; }
  .section-title { font-size: 13px; font-weight: 700; color: #C89F9D; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea { font-size: 14px; padding: 10px 12px; border: 1px solid #DDD; border-radius: 8px; background: #FAFAFA; color: #2C2C2C; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #C89F9D; }
  .field textarea { resize: vertical; min-height: 80px; }
  .consent-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #F0E8E7; }
  .consent-row:last-child { border-bottom: none; }
  .consent-row input[type="checkbox"] { margin-top: 3px; width: 17px; height: 17px; accent-color: #785D56; cursor: pointer; flex-shrink: 0; }
  .consent-row label { font-size: 13.5px; color: #2C2C2C; text-transform: none; letter-spacing: normal; font-weight: 400; cursor: pointer; line-height: 1.5; }
  .consent-row .consent-sub { display: block; font-size: 11.5px; color: #999; margin-top: 3px; font-weight: 400; }
  .footer { position: sticky; bottom: 0; background: #fff; border-top: 1px solid #EDE4E3; padding: 14px 24px; display: flex; justify-content: flex-end; gap: 10px; }
  .btn-salvar { padding: 12px 28px; background: #785D56; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-salvar:hover { background: #C89F9D; }
  .btn-cancelar { padding: 12px 20px; background: #fff; border: 1px solid #DDD; border-radius: 8px; font-size: 14px; color: #999; cursor: pointer; }
  .toast { position: fixed; bottom: 80px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; display: none; }
  .toast.ok { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
  .toast.erro { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }
  .loading { text-align: center; padding: 40px; color: #999; }
</style>
</head>
<body>

<div class="header">
  <button class="btn-voltar" id="btn-voltar">← Voltar</button>
  <h1>Editar paciente</h1>
</div>

<div class="container" id="form-container">
  <div class="loading">Carregando dados...</div>
</div>

<div class="footer">
  <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
  <button class="btn-salvar" onclick="salvar()">Salvar alterações</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gjzzbnkhipfsbmpxbzur.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IqQnG0EiFqTapqq7xyw6Lw_HsJkA2CK';
const params = new URLSearchParams(window.location.search);
const PACIENTE_ID = params.get('id');

document.getElementById('btn-voltar').onclick = () => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}`;
document.getElementById('btn-cancelar').onclick = () => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}`;

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + tipo;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function v(id) { return document.getElementById(id)?.value || ''; }
function set(id, val) { const el = document.getElementById(id); if (el && val !== null && val !== undefined) el.value = val; }
function vCheck(id) { return document.getElementById(id)?.checked || false; }
function setCheck(id, val) { const el = document.getElementById(id); if (el) el.checked = !!val; }

function toggleResp() {
  const val = document.getElementById('f_resp_tipo').value;
  const campos = document.getElementById('resp-campos');
  campos.style.display = val === 'outra_pessoa' ? 'block' : 'none';
}

async function carregar() {
  if (!PACIENTE_ID) {
    document.getElementById('form-container').innerHTML = '<div class="loading" style="color:#C62828">ID não informado.</div>';
    return;
  }
  const [r, rPrecos] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    }),
    fetch(`${SUPABASE_URL}/rest/v1/tabela_precos?ativo=eq.true&order=modalidade,tipo`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    })
  ]);
  const data = await r.json();
  const precos = await rPrecos.json();
  if (!data.length) {
    document.getElementById('form-container').innerHTML = '<div class="loading" style="color:#C62828">Paciente não encontrada.</div>';
    return;
  }
  const p = data[0];
  renderForm(p);
  popularPrecos(precos, p.preco_id);
}

function popularPrecos(precos, precoIdAtual) {
  const select = document.getElementById('f_preco_id');
  if (!select) return;
  select.innerHTML = '<option value="">Selecione</option>' +
    precos.map(pr => `<option value="${pr.id}">${pr.nome}</option>`).join('');
  if (precoIdAtual) select.value = precoIdAtual;
}

function renderForm(p) {
  document.getElementById('form-container').innerHTML = `
    <div class="section">
      <div class="section-title">Dados pessoais</div>
      <div class="grid-2" style="margin-bottom:14px">
        <div class="field" style="grid-column:1/-1"><label>Nome completo</label><input id="f_nome" type="text"></div>
      </div>
      <div class="grid-3" style="margin-bottom:14px">
        <div class="field"><label>Status</label>
          <select id="f_status">
            <option value="ativo">Ativo</option>
            <option value="pausado">Pausado</option>
            <option value="lista de espera">Lista de espera</option>
            <option value="encerrado">Encerrado (por mim)</option>
            <option value="desistente">Desistente (pela paciente)</option>
            <option value="alta">Alta (comum acordo)</option>
          </select>
        </div>
      </div>
      <div class="grid-3">
        <div class="field"><label>Data de nascimento</label><input id="f_nasc" type="date"></div>
        <div class="field"><label>Gênero</label>
          <select id="f_genero">
            <option value="">Selecione</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="não-binário">Não-binário</option>
            <option value="outro">Outro</option>
            <option value="prefiro não dizer">Prefiro não dizer</option>
          </select>
        </div>
        <div class="field"><label>Estado civil</label>
          <select id="f_estado_civil">
            <option value="">Selecione</option>
            <option value="solteiro(a)">Solteiro(a)</option>
            <option value="casado(a)">Casado(a)</option>
            <option value="divorciado(a)">Divorciado(a)</option>
            <option value="viúvo(a)">Viúvo(a)</option>
            <option value="união estável">União estável</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Contato</div>
      <div class="grid-2">
        <div class="field"><label>E-mail</label><input id="f_email" type="email"></div>
        <div class="field"><label>Telefone</label><input id="f_tel" type="text"></div>
        <div class="field"><label>WhatsApp</label><input id="f_wpp" type="text"></div>
        <div class="field"><label>CPF</label><input id="f_cpf" type="text"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Endereço</div>
      <div class="grid-3">
        <div class="field"><label>CEP</label><input id="f_cep" type="text"></div>
        <div class="field" style="grid-column:2/-1"><label>Logradouro</label><input id="f_end" type="text"></div>
        <div class="field"><label>Número</label><input id="f_num" type="text"></div>
        <div class="field"><label>Complemento</label><input id="f_comp" type="text"></div>
        <div class="field"><label>Bairro</label><input id="f_bairro" type="text"></div>
        <div class="field"><label>Cidade</label><input id="f_cidade" type="text"></div>
        <div class="field"><label>Estado</label><input id="f_estado" type="text"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Informações clínicas</div>
      <div class="grid-2">
        <div class="field"><label>Escolaridade</label><input id="f_escol" type="text"></div>
        <div class="field"><label>Profissão</label><input id="f_prof" type="text"></div>
        <div class="field"><label>Como conheceu</label><input id="f_como" type="text"></div>
        <div class="field"><label>Tem filhos?</label>
          <select id="f_filhos">
            <option value="">Selecione</option>
            <option value="true">Sim</option>
            <option value="false">Não</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:14px"><label>Anotações</label><textarea id="f_anot"></textarea></div>
    </div>

    <div class="section">
      <div class="section-title">Atendimento</div>
      <div class="grid-2">
        <div class="field" style="grid-column:1/-1"><label>Modalidade financeira</label>
          <select id="f_preco_id">
            <option value="">Selecione</option>
          </select>
        </div>
        <div class="field"><label>Frequência</label>
          <select id="f_freq">
            <option value="">Selecione</option>
            <option value="semanal">Semanal</option>
            <option value="quinzenal">Quinzenal</option>
            <option value="mensal">Mensal</option>
          </select>
        </div>
        <div class="field"><label>Forma de pagamento</label>
          <select id="f_pgto">
            <option value="">Selecione</option>
            <option value="PIX">PIX</option>
            <option value="transferencia">Transferência bancária</option>
            <option value="link_pagamento">Link de pagamento</option>
          </select>
        </div>
        <div class="field" style="grid-column:1/-1"><label>Link Google Meet</label><input id="f_meet" type="url" placeholder="https://meet.google.com/..."></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Consentimentos</div>
      <div class="consent-row">
        <input type="checkbox" id="f_consent_wpp">
        <label for="f_consent_wpp">
          Autorizo o recebimento de lembretes por WhatsApp
          <span class="consent-sub">Financeiro, links de sessão, tarefas terapêuticas e demais avisos.</span>
        </label>
      </div>
      <div class="consent-row">
        <input type="checkbox" id="f_consent_gravacao">
        <label for="f_consent_gravacao">
          Estou ciente e de acordo com a gravação das sessões para fins de transcrição clínica
          <span class="consent-sub">O áudio é utilizado exclusivamente para elaborar o registro da evolução e é descartado em seguida.</span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Financeiro</div>
      <div class="grid-2">
        <div class="field" style="grid-column:1/-1">
          <label>Quando a paciente costuma pagar?</label>
          <select id="f_data_pgto">
            <option value="">Selecione</option>
            <option value="Todo dia 5">Todo dia 5</option>
            <option value="Todo dia 10">Todo dia 10</option>
            <option value="Todo dia 15">Todo dia 15</option>
            <option value="Todo dia 20">Todo dia 20</option>
            <option value="Todo dia 25">Todo dia 25</option>
            <option value="Todo dia 30">Todo dia 30</option>
            <option value="Antes da sessão">Antes da sessão</option>
            <option value="Depois da sessão">Depois da sessão</option>
          </select>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Responsável financeiro</label>
          <select id="f_resp_tipo" onchange="toggleResp()">
            <option value="propria">A própria paciente</option>
            <option value="outra_pessoa">Outra pessoa</option>
          </select>
        </div>
        <div id="resp-campos" style="display:none; grid-column:1/-1">
          <div class="grid-2">
            <div class="field"><label>Nome do responsável</label><input id="f_resp_nome" type="text"></div>
            <div class="field"><label>CPF do responsável</label><input id="f_resp_cpf" type="text" placeholder="000.000.000-00"></div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Preencher valores
  set('f_nome', p.nome_completo);
  set('f_status', p.status);
  set('f_nasc', p.data_nascimento);
  set('f_genero', p.genero);
  set('f_estado_civil', p.estado_civil);
  set('f_email', p.email);
  set('f_tel', p.telefone);
  set('f_wpp', p.whatsapp);
  set('f_cpf', p.cpf);
  set('f_cep', p.cep);
  set('f_end', p.endereco);
  set('f_num', p.numero || p['Nº']);
  set('f_comp', p.complemento);
  set('f_bairro', p.bairro);
  set('f_cidade', p.cidade);
  set('f_estado', p.estado);
  set('f_escol', p.escolaridade);
  set('f_prof', p.profissao);
  set('f_como', p.como_conheceu);
  set('f_filhos', p.tem_filhos !== null && p.tem_filhos !== undefined ? String(p.tem_filhos) : '');
  set('f_anot', p.anotacoes);
  set('f_freq', p.frequencia);
  set('f_pgto', p.forma_pagamento);
  set('f_meet', p.link_meet);
  setCheck('f_consent_wpp', p.consentimento_whatsapp);
  setCheck('f_consent_gravacao', p.consentimento_gravacao);
  set('f_data_pgto', p.data_pagamento);
  if (p.responsavel_financeiro === 'outra_pessoa') {
    document.getElementById('f_resp_tipo').value = 'outra_pessoa';
    document.getElementById('resp-campos').style.display = 'block';
    set('f_resp_nome', p.responsavel_nome);
    set('f_resp_cpf', p.responsavel_cpf);
  }
}

async function salvar() {
  if (!PACIENTE_ID) return;
  const dados = {
    nome_completo: v('f_nome'),
    status: v('f_status') || 'ativo',
    data_nascimento: v('f_nasc') || null,
    genero: v('f_genero') || null,
    estado_civil: v('f_estado_civil') || null,
    email: v('f_email') || null,
    telefone: v('f_tel') || null,
    whatsapp: v('f_wpp') || null,
    cpf: v('f_cpf') || null,
    cep: v('f_cep') || null,
    endereco: v('f_end') || null,
    numero: v('f_num') || null,
    complemento: v('f_comp') || null,
    bairro: v('f_bairro') || null,
    cidade: v('f_cidade') || null,
    estado: v('f_estado') || null,
    escolaridade: v('f_escol') || null,
    profissao: v('f_prof') || null,
    como_conheceu: v('f_como') || null,
    tem_filhos: v('f_filhos') !== '' ? v('f_filhos') === 'true' : null,
    anotacoes: v('f_anot') || null,
    preco_id: v('f_preco_id') ? parseInt(v('f_preco_id')) : null,
    frequencia: v('f_freq') || null,
    forma_pagamento: v('f_pgto') || null,
    link_meet: v('f_meet') || null,
    consentimento_whatsapp: vCheck('f_consent_wpp'),
    consentimento_gravacao: vCheck('f_consent_gravacao'),
    data_pagamento: v('f_data_pgto') || null,
    responsavel_financeiro: v('f_resp_tipo') === 'outra_pessoa' ? 'outra_pessoa' : 'propria',
    responsavel_nome: v('f_resp_tipo') === 'outra_pessoa' ? (v('f_resp_nome') || null) : null,
    responsavel_cpf: v('f_resp_tipo') === 'outra_pessoa' ? (v('f_resp_cpf') || null) : null,
  };

  // remover nulls
  Object.keys(dados).forEach(k => { if (dados[k] === null) delete dados[k]; });

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify(dados)
    });
    if (r.ok) {
      toast('Dados salvos com sucesso!', 'ok');
      setTimeout(() => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}`, 1200);
    } else {
      const err = await r.json();
      toast('Erro: ' + (err.message || JSON.stringify(err)), 'erro');
    }
  } catch(e) {
    toast('Erro: ' + e.message, 'erro');
  }
}

carregar();
</script>
</body>
</html>
