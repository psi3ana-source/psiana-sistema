<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsiAna — Agendar Sessão</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #FAF6F5; color: #2C2C2C; }
  .header { background: #fff; border-bottom: 1px solid #EDE4E3; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 700; color: #785D56; }
  .header .paciente-nome { font-size: 13px; color: #999; margin-left: 4px; }
  .btn-voltar { padding: 7px 14px; border: 1px solid #DDD; border-radius: 8px; background: #fff; color: #785D56; font-size: 13px; cursor: pointer; }
  .btn-voltar:hover { background: #F0E8E7; }
  .container { max-width: 620px; margin: 0 auto; padding: 24px 16px 100px; }
  .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #EDE4E3; }
  .section-title { font-size: 13px; font-weight: 700; color: #C89F9D; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea { font-size: 14px; padding: 10px 12px; border: 1px solid #DDD; border-radius: 8px; background: #FAFAFA; color: #2C2C2C; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #C89F9D; }
  .field textarea { resize: vertical; min-height: 70px; }
  .meet-row { display: flex; gap: 8px; }
  .meet-row input { flex: 1; }
  .btn-meet { padding: 10px 14px; background: #FAF6F5; border: 1px solid #DDD; border-radius: 8px; font-size: 13px; color: #785D56; cursor: pointer; white-space: nowrap; }
  .btn-meet:hover { background: #F0E8E7; }
  .footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #EDE4E3; padding: 14px 24px; display: flex; justify-content: flex-end; gap: 10px; }
  .btn-salvar { padding: 12px 28px; background: #785D56; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-salvar:hover { background: #C89F9D; }
  .btn-cancelar { padding: 12px 20px; background: #fff; border: 1px solid #DDD; border-radius: 8px; font-size: 14px; color: #999; cursor: pointer; }
  .toast { position: fixed; bottom: 80px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; display: none; }
  .toast.ok { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
  .toast.erro { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }
  .hint { font-size: 12px; color: #999; margin-top: 3px; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <button class="btn-voltar" id="btn-voltar">← Voltar</button>
  <h1 id='page-title'>Agendar sessão</h1>
  <span class="paciente-nome" id="paciente-nome"></span>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">Data e horário</div>
    <div class="grid-2">
      <div class="field" style="grid-column:1/-1">
        <label>Data da sessão *</label>
        <input type="date" id="f_data">
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Horário de início</label>
        <input type="time" id="f_inicio">
        <span class="hint">Duração padrão de 50 minutos</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sessão</div>
    <div class="grid-2">
      <div class="field">
        <label>Status</label>
        <select id="f_status">
          <option value="agendada">Agendada</option>
          <option value="confirmada">Confirmada</option>
          <option value="realizada">Realizada</option>
          <option value="faltou">Paciente faltou</option>
          <option value="cancelada">Cancelada</option>
          <option value="remarcada">Remarcada</option>
        </select>
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="f_tipo">
          <option value="primeira sessão">Primeira sessão</option>
          <option value="sessão regular">Sessão regular</option>
          <option value="avaliação">Avaliação</option>
          <option value="devolutiva">Devolutiva</option>
          <option value="emergência">Emergência</option>
        </select>
      </div>
      <div class="field" style="grid-column:1/-1">
        <label>Link da videochamada</label>
        <div class="meet-row">
          <input type="url" id="f_meet" placeholder="https://meet.google.com/...">
          <button class="btn-meet" onclick="window.open('https://meet.google.com/new','_blank')">🎥 Novo</button>
        </div>
        <span class="hint" id="meet-hint"></span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Financeiro</div>
    <div class="grid-2">
      <div class="field">
        <label>Status do pagamento</label>
        <select id="f_status_pgto" onchange="toggleDataPgto()">
          <option value="pendente">Pendente</option>
          <option value="pago">Pago</option>
          <option value="isento">Isento</option>
        </select>
      </div>
      <div class="field" id="campo-data-pgto" style="display:none">
        <label>Data do pagamento</label>
        <input type="date" id="f_data_pgto">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Observações</div>
    <div class="field">
      <textarea id="f_obs" placeholder="Anotações sobre a sessão..."></textarea>
    </div>
  </div>

</div>

<div class="footer">
  <button class="btn-cancelar" id="btn-cancelar">Cancelar</button>
  <button class="btn-salvar" onclick="salvar()">Salvar sessão</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gjzzbnkhipfsbmpxbzur.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IqQnG0EiFqTapqq7xyw6Lw_HsJkA2CK';
const N8N_CALENDAR_WEBHOOK = 'https://psi3ana.app.n8n.cloud/webhook/create-session-event';
const params = new URLSearchParams(window.location.search);
const PACIENTE_ID = params.get('paciente_id');
const SESSAO_ID = params.get('sessao_id');
const REMARCAR_ID = params.get('remarcar_id');
const ORIGEM = params.get('origem') || 'dados';

document.getElementById('btn-voltar').onclick = () => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}&aba=${ORIGEM}`;
document.getElementById('btn-cancelar').onclick = () => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}&aba=${ORIGEM}`;

// Pré-definir hoje como data padrão
document.getElementById('f_data').value = new Date().toISOString().split('T')[0];

function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + tipo;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function v(id) { return document.getElementById(id)?.value || ''; }

function set(id, val) { const el = document.getElementById(id); if (el && val !== null && val !== undefined) el.value = val; }

let ehPrimeiraSessao = false;
let valorCobradoSessao = null;
let pacienteFormaPagamento = null;
let numeroEncontro = 1;

function toggleDataPgto() {
  const status = document.getElementById('f_status_pgto').value;
  const campo = document.getElementById('campo-data-pgto');
  campo.style.display = status === 'pago' ? 'flex' : 'none';
  if (status === 'pago' && !v('f_data_pgto')) {
    document.getElementById('f_data_pgto').value = new Date().toISOString().split('T')[0];
  }
}

async function carregarPaciente() {
  if (!PACIENTE_ID) return;
  try {
    // Verificar sessões existentes (só se não for edição)
    if (!SESSAO_ID) {
      // Busca sessões que contam como encontro (exclui canceladas)
      const rCheck = await fetch(`${SUPABASE_URL}/rest/v1/sessoes?paciente_id=eq.${PACIENTE_ID}&status=not.eq.cancelada&select=id`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      });
      const checkData = await rCheck.json();
      ehPrimeiraSessao = checkData.length === 0;
      numeroEncontro = checkData.length + 1; // próximo encontro
      if (ehPrimeiraSessao) {
        document.getElementById('f_tipo').value = 'primeira sessão';
      } else {
        document.getElementById('f_tipo').value = 'sessão regular';
      }
    }

    const promises = [
      fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}&select=nome_completo,link_meet,valor_sessao,forma_pagamento,preco_id`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      })
    ];
    if (SESSAO_ID) {
      promises.push(fetch(`${SUPABASE_URL}/rest/v1/sessoes?id=eq.${SESSAO_ID}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
      }));
    }
    const results = await Promise.all(promises);
    const pacData = await results[0].json();

    if (pacData.length) {
      const p = pacData[0];
      document.getElementById('paciente-nome').textContent = '— ' + (p.nome_completo || '');
      if (p.link_meet) {
        document.getElementById('f_meet').value = p.link_meet;
        document.getElementById('meet-hint').textContent = 'Link padrão da paciente';
      }
      pacienteFormaPagamento = p.forma_pagamento || null;
      // Buscar valor da modalidade financeira
      if (p.preco_id) {
        try {
          const rp = await fetch(`${SUPABASE_URL}/rest/v1/tabela_precos?id=eq.${p.preco_id}&select=valor_unitario`, {
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          });
          const dp = await rp.json();
          if (dp.length) valorCobradoSessao = parseFloat(dp[0].valor_unitario);
        } catch(e) {}
      }
    }

    // Modo edição
    if (SESSAO_ID && results[1]) {
      document.getElementById('page-title').textContent = 'Editar sessão';
      const sesData = await results[1].json();
      if (sesData.length) {
        const s = sesData[0];
        if (s.data_sessao) set('f_data', s.data_sessao);
        if (s.horario_inicio) {
          const hi = new Date(s.horario_inicio);
          set('f_inicio', `${String(hi.getHours()).padStart(2,'0')}:${String(hi.getMinutes()).padStart(2,'0')}`);
        }
        set('f_status', s.status);
        set('f_tipo', s.tipo_atendimento);
        if (s.link_videochamada) {
          set('f_meet', s.link_videochamada);
          document.getElementById('meet-hint').textContent = 'Link da sessão';
        }
        set('f_status_pgto', s.status_pagamento || 'pendente');
        if (s.data_pagamento) set('f_data_pgto', s.data_pagamento);
        toggleDataPgto();
        set('f_obs', s.observacoes);
        valorCobradoSessao = s.valor_cobrado || null;
      }
    }

    // Modo remarcação
    if (REMARCAR_ID) {
      document.getElementById('page-title').textContent = 'Remarcar sessão';
      document.getElementById('f_status').value = 'agendada';
      document.getElementById('f_data').value = '';
    }
  } catch(e) { console.error(e); }
}

async function criarEventoCalendar(sessaoId, horarioInicio, horarioFim, tipo, numEncontro, horaFormatada) {
  try {
    const titulo = `Encontro ${numEncontro} — Sessão`;
    const resp = await fetch(N8N_CALENDAR_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessao_id: String(sessaoId),
        paciente_nome: titulo,
        data_inicio: horarioInicio,
        data_fim: horarioFim,
        descricao: `${tipo} — PsiAna Sistema`
      })
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data;
  } catch(e) {
    console.warn('Erro ao criar evento no Calendar:', e);
    return null;
  }
}

async function salvar() {
  if (!PACIENTE_ID) { toast('ID da paciente não encontrado', 'erro'); return; }
  const data = v('f_data');
  if (!data) { toast('Informe a data da sessão', 'erro'); return; }
  const inicio = v('f_inicio');
  if (!inicio) { toast('Informe o horário de início', 'erro'); return; }
  if (!v('f_tipo')) { toast('Informe o tipo de sessão', 'erro'); return; }
  if (!v('f_status_pgto')) { toast('Informe o status do pagamento', 'erro'); return; }

  // Montar horários com timezone de Brasília (duração padrão 50 min)
  let horario_inicio = null, horario_fim = null;
  if (inicio) {
    horario_inicio = `${data}T${inicio}:00-03:00`;
    const [h, m] = inicio.split(':').map(Number);
    const totalMin = h * 60 + m + 50;
    const hFim = Math.floor(totalMin / 60) % 24;
    const mFim = totalMin % 60;
    const fimStr = `${String(hFim).padStart(2,'0')}:${String(mFim).padStart(2,'0')}`;
    horario_fim = `${data}T${fimStr}:00-03:00`;
  }

  const dados = {
    paciente_id: parseInt(PACIENTE_ID),
    data_sessao: data,
    horario_inicio,
    horario_fim,
    status: v('f_status') || 'agendada',
    tipo_atendimento: v('f_tipo') || null,
    link_videochamada: v('f_meet') || null,
    valor_cobrado: valorCobradoSessao,
    status_pagamento: v('f_status_pgto') || 'pendente',
    forma_pagamento: pacienteFormaPagamento,
    data_pagamento: v('f_data_pgto') || null,
    observacoes: v('f_obs') || null,
  };

  // Remover nulls
  Object.keys(dados).forEach(k => { if (dados[k] === null) delete dados[k]; });

  try {
    let r, sessaoSalva = null;
    if (SESSAO_ID) {
      // Edição — PATCH
      delete dados.paciente_id;
      r = await fetch(`${SUPABASE_URL}/rest/v1/sessoes?id=eq.${SESSAO_ID}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify(dados)
      });
    } else {
      // Nova sessão — POST
      r = await fetch(`${SUPABASE_URL}/rest/v1/sessoes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Prefer: 'return=representation' },
        body: JSON.stringify(dados)
      });
      if (r.ok) {
        const retorno = await r.json();
        sessaoSalva = Array.isArray(retorno) ? retorno[0] : retorno;
        // Fallback: buscar a sessão recém-criada se id não vier no retorno
        if (!sessaoSalva?.id && dados.data_sessao) {
          const rBusca = await fetch(`${SUPABASE_URL}/rest/v1/sessoes?paciente_id=eq.${PACIENTE_ID}&data_sessao=eq.${dados.data_sessao}&order=id.desc&limit=1`, {
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
          });
          const buscaData = await rBusca.json();
          if (buscaData.length) sessaoSalva = buscaData[0];
        }
      }
    }

    if (r.ok) {
      // Se for a primeira sessão, atualiza campo primeira_sessao no paciente
      if (ehPrimeiraSessao && !SESSAO_ID) {
        await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({ primeira_sessao: data })
        });
      }

      // Integração Google Calendar — apenas novas sessões com horário definido
      if (!SESSAO_ID && sessaoSalva?.id && horario_inicio && horario_fim) {
        const tipo = v('f_tipo') || 'sessão regular';
        // Formatar hora para título: "10h" ou "10h30"
        const [hStr, mStr] = inicio.split(':');
        const horaFormatada = mStr === '00' ? `${parseInt(hStr)}h` : `${parseInt(hStr)}h${mStr}`;
        const calResp = await criarEventoCalendar(sessaoSalva.id, horario_inicio, horario_fim, tipo, numeroEncontro, horaFormatada);        if (calResp?.google_event_id) {
          const meetLink = calResp.hangoutLink || calResp.meet_link || null;
          // Salvar google_event_id e meet_link na sessão
          await fetch(`${SUPABASE_URL}/rest/v1/sessoes?id=eq.${sessaoSalva.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
            body: JSON.stringify({
              google_event_id: calResp.google_event_id,
              meet_link: meetLink,
              link_videochamada: meetLink || dados.link_videochamada || null
            })
          });
          // Se não tiver link Meet salvo na paciente, salvar este como fixo
          if (meetLink) {
            const rPac = await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}&select=link_meet`, {
              headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
            });
            const pacData = await rPac.json();
            if (!pacData[0]?.link_meet) {
              await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${PACIENTE_ID}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
                body: JSON.stringify({ link_meet: meetLink })
              });
            }
          }
        }
      }

      toast(SESSAO_ID ? 'Sessão atualizada!' : 'Sessão agendada! 📅', 'ok');
      setTimeout(() => window.location.href = `ficha-paciente_1.html?id=${PACIENTE_ID}&aba=${ORIGEM}`, 1200);
    } else {
      const err = await r.json();
      toast('Erro: ' + (err.message || JSON.stringify(err)), 'erro');
    }
  } catch(e) {
    toast('Erro: ' + e.message, 'erro');
  }
}

carregarPaciente();
</script>
</body>
</html>
